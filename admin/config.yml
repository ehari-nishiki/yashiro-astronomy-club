backend:
  name: github
  repo: ehari-nishiki/yashiro-astronomy-club
  branch: main
  base_url: https://api.netlify.com

media_folder: images/archive
public_folder: images/archive

collections:
  - name: archive
    label: "活動記録・写真"
    files:
      - label: "ギャラリーデータ"
        name: gallery
        file: data/archive.json
        fields:
          - label: "年度別データ"
            name: years
            widget: list
            label_singular: "年度"
            summary: "{{fields.year}}年度"
            fields:
              - label: "年度"
                name: year
                widget: string
              - label: "年度概要"
                name: summary
                widget: text
              - label: "写真一覧"
                name: photos
                widget: list
                label_singular: "写真"
                summary: "{{fields.title}}"
                fields:
                  - label: "タイトル"
                    name: title
                    widget: string
                  - label: "説明文"
                    name: caption
                    widget: string
                  - label: "写真ファイル"
                    name: src
                    widget: image
                  - label: "alt テキスト"
                    name: alt
                    widget: string
                  - label: "大きめ表示"
                    name: wide
                    widget: boolean
                    default: false
                    required: false
